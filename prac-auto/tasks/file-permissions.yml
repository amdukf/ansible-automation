---
- name: Harden cron system file permissions (Lynis compliance)
  become: true
  tags: cron_permissions

  block:

    - name: Secure /etc/crontab
      ansible.builtin.file:
        path: /etc/crontab
        owner: root
        group: root
        mode: '0600'

    - name: Secure /etc/cron.d directory
      ansible.builtin.file:
        path: /etc/cron.d
        owner: root
        group: root
        mode: '0700'

    - name: Secure /etc/cron.daily directory
      ansible.builtin.file:
        path: /etc/cron.daily
        owner: root
        group: root
        mode: '0700'

    - name: Secure /etc/cron.hourly directory
      ansible.builtin.file:
        path: /etc/cron.hourly
        owner: root
        group: root
        mode: '0700'

    - name: Secure /etc/cron.weekly directory
      ansible.builtin.file:
        path: /etc/cron.weekly
        owner: root
        group: root
        mode: '0700'

    - name: Secure /etc/cron.monthly directory
      ansible.builtin.file:
        path: /etc/cron.monthly
        owner: root
        group: root
        mode: '0700'

- name: Secure /etc/ssh/sshd_config file
  become: true
  tags: ssh_config_permissions
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'

- name: Secure sudoers.d directory ownership
  become: true
  tags: cron_permissions
  ansible.builtin.file:
    path: /etc/sudoers.d
    owner: root
    group: root
    mode: '0750'
