---
managed_user_name: ansible
managed_user_shell: /bin/bash
managed_user_groups:
  - sudo
ssh_port: 23389
ssh_banner_path: /etc/mybanner

ssh_hardening_settings:
  - { regexp: '^#?Port\s+', line: 'Port {{ ssh_port }}' }
  - { regexp: '^#?PubkeyAuthentication\s+', line: 'PubkeyAuthentication yes' }
  - { regexp: '^#?PasswordAuthentication\s+', line: 'PasswordAuthentication no' }
  - { regexp: '^#?PermitRootLogin\s+', line: 'PermitRootLogin no' }
  - { regexp: '^#?AllowTcpForwarding\s+', line: 'AllowTcpForwarding no' }
  - { regexp: '^#?AllowAgentForwarding\s+', line: 'AllowAgentForwarding no' }
  - { regexp: '^#?MaxSessions\s+', line: 'MaxSessions 2' }
  - { regexp: '^#?MaxAuthTries\s+', line: 'MaxAuthTries 3' }
  - { regexp: '^#?LogLevel\s+', line: 'LogLevel VERBOSE' }
  - { regexp: '^#?ClientAliveInterval\s+', line: 'ClientAliveInterval 300' }
  - { regexp: '^#?ClientAliveCountMax\s+', line: 'ClientAliveCountMax 2' }
  - { regexp: '^#?TCPKeepAlive\s+', line: 'TCPKeepAlive no' }
  - { regexp: '^#?PermitEmptyPasswords\s+', line: 'PermitEmptyPasswords no' }
  - { regexp: '^#?X11Forwarding\s+', line: 'X11Forwarding no' }
  - { regexp: '^#?AllowUsers\s+', line: 'AllowUsers {{ managed_user_name }}' }
  - { regexp: '^#?Banner\s+', line: 'Banner {{ ssh_banner_path }}' }

fail2ban_sshd_enabled: true
fail2ban_bantime: "5h"
fail2ban_findtime: "5m"
fail2ban_maxretry: 2
fail2ban_ignoreip:
  - "127.0.0.1"
  - "::1"
fail2ban_jail_local_path: /etc/fail2ban/jail.local

docker_offline_source_dir: "{{ playbook_dir }}/../downloads/docker/ubuntu-noble"

os_auth_pam_passwdqc_options: min=disabled,disabled,16,12,8 # Used in Debian

# Auditd settings
auditd_local_events: true # The original value is yes, because of ansible lint we set it here true and we ternate it in the template to yes
auditd_write_logs: true # The original value is yes, because of ansible lint we set it here true and we ternate it in the template to yes
auditd_log_file: /var/log/audit/audit.log
auditd_log_group: adm
auditd_log_format: ENRICHED
auditd_flush: INCREMENTAL_ASYNC
auditd_freq: 50
auditd_max_log_file: 100
auditd_num_logs: 10
auditd_priority_boost: 4
auditd_name_format: HOSTNAME
auditd_max_log_file_action: ROTATE
auditd_space_left: 1000
auditd_space_left_action: SYSLOG
auditd_admin_space_left: 500
auditd_admin_space_left_action: SYSLOG
auditd_disk_full_action: SYSLOG
auditd_disk_error_action: SYSLOG
auditd_q_depth: 2000
auditd_overflow_action: SYSLOG
auditd_max_restarts: 10
auditd_plugin_dir: /etc/audit/plugins.d
auditd_end_of_event_timeout: 2

# Apt repository settings and credentials
nx_apt_public_signing_key: {{ playbook_dir }}/../downloads/docker/ubuntu-noble



apt_repo_url: http://192.168.56.99:8081/repository/ubuntu/
apt_repo_user: nx-apt
apt_repo_password: duke123@
apt_security_repo_url: http://192.168.56.99:8081/repository/ubuntu-security/
apt_security_repo_user: nx-apt
apt_security_repo_password: duke123@
